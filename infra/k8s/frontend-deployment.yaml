apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-guardrails-frontend
  namespace: llm-guardrails
  labels:
    app: llm-guardrails
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-guardrails
      component: frontend
  template:
    metadata:
      labels:
        app: llm-guardrails
        component: frontend
    spec:
      containers:
        - name: frontend
          image: llm-guardrails-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://llm-guardrails-backend:8000"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: llm-guardrails-frontend
  namespace: llm-guardrails
  labels:
    app: llm-guardrails
    component: frontend
spec:
  selector:
    app: llm-guardrails
    component: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
