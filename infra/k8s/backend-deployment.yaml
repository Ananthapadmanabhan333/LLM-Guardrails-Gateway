apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-guardrails-backend
  namespace: llm-guardrails
  labels:
    app: llm-guardrails
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: llm-guardrails
      component: backend
  template:
    metadata:
      labels:
        app: llm-guardrails
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: llm-guardrails-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: llm-guardrails-secrets
                  key: database_url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: llm-guardrails-secrets
                  key: redis_url
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-guardrails-secrets
                  key: jwt_secret
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-guardrails-secrets
                  key: openai_api_key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-guardrails-secrets
                  key: anthropic_api_key
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
            - name: OTLP_EXPORTER_ENDPOINT
              value: "otel-collector:4317"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: llm-guardrails-backend
  namespace: llm-guardrails
  labels:
    app: llm-guardrails
    component: backend
spec:
  selector:
    app: llm-guardrails
    component: backend
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llm-guardrails-backend-hpa
  namespace: llm-guardrails
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llm-guardrails-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
