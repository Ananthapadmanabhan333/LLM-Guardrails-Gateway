apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: llm-guardrails-ingress
  namespace: llm-guardrails
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.guardrails.example.com
        - dashboard.guardrails.example.com
      secretName: llm-guardrails-tls
  rules:
    - host: api.guardrails.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llm-guardrails-backend
                port:
                  number: 8000
    - host: dashboard.guardrails.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: llm-guardrails-frontend
                port:
                  number: 3000
